name: Terraform Destroy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to destroy"
        required: true
        type: choice
        options:
          - dev
          - prod
      confirm:
        description: 'Type "destroy" to confirm — this is irreversible'
        required: true
        type: string

permissions:
  id-token: write
  contents: read

env:
  TF_VERSION: "1.7.5"
  TF_DIR: "./terraform"
  ARM_USE_OIDC: "true"
  ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}

jobs:
  # ── Safety gate ────────────────────────────────────────────────────────────
  validate-confirmation:
    name: Validate confirmation input
    runs-on: ubuntu-latest
    steps:
      - name: Check confirmation word
        run: |
          if [ "${{ github.event.inputs.confirm }}" != "destroy" ]; then
            echo "❌ Confirmation failed — you must type exactly: destroy"
            exit 1
          fi
          echo "✅ Confirmation accepted"

  # ── Destroy Dev ────────────────────────────────────────────────────────────
  destroy-dev:
    name: Destroy → dev
    runs-on: ubuntu-latest
    environment: dev
    needs: [validate-confirmation]
    if: github.event.inputs.environment == 'dev'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Terraform Init
        working-directory: ${{ env.TF_DIR }}
        run: terraform init -backend-config=environments/dev/backend.tf
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Terraform Destroy
        working-directory: ${{ env.TF_DIR }}
        run: |
          terraform destroy \
            -var-file=environments/dev/terraform.tfvars \
            -auto-approve \
            -input=false
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          TF_VAR_databricks_account_id: ${{ secrets.DATABRICKS_ACCOUNT_ID }}

  # ── Destroy Prod ───────────────────────────────────────────────────────────
  destroy-prod:
    name: Destroy → prod
    runs-on: ubuntu-latest
    environment: prod  # requires manual approval from reviewers
    needs: [validate-confirmation]
    if: github.event.inputs.environment == 'prod'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Azure Login (OIDC – prod)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID_PROD }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID_PROD }}

      - name: Terraform Init
        working-directory: ${{ env.TF_DIR }}
        run: terraform init -backend-config=environments/prod/backend.tf
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID_PROD }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID_PROD }}

      - name: Terraform Destroy
        working-directory: ${{ env.TF_DIR }}
        run: |
          terraform destroy \
            -var-file=environments/prod/terraform.tfvars \
            -auto-approve \
            -input=false
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID_PROD }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID_PROD }}
          TF_VAR_databricks_account_id: ${{ secrets.DATABRICKS_ACCOUNT_ID }}
