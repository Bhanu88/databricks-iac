name: Terraform Deploy

on:
  push:
    branches:
      - main
    paths:
      - "terraform/**"
      - ".github/workflows/terraform-*.yml"

  # Allow manual deploy with environment selection
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        type: choice
        options:
          - dev
          - prod

permissions:
  id-token: write
  contents: read

env:
  TF_VERSION: "1.7.5"
  TF_DIR: "./terraform"
  ARM_USE_OIDC: "true"
  ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}

jobs:
  # ── Deploy Dev (auto on merge) ────────────────────────────────────────────
  deploy-dev:
    name: Deploy → dev
    runs-on: ubuntu-latest
    environment: dev  # maps to GitHub environment with OIDC config
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # Databricks enforces a hard limit of one Unity Catalog metastore per region
      # per account.  If one already exists, Terraform must adopt it rather than
      # create a new one.  We discover the existing ID here and export it as
      # TF_VAR_databricks_metastore_id; the unity_catalog module uses count = 0
      # on the metastore resource when this variable is non-empty.
      - name: Discover existing Databricks metastore
        run: |
          DATABRICKS_TOKEN=$(az account get-access-token \
            --resource 2ff814a6-3304-4ab8-85cb-cd0e6f879c1d \
            --query accessToken -o tsv)
          METASTORE_ID=$(curl -sf \
            -H "Authorization: Bearer $DATABRICKS_TOKEN" \
            "https://accounts.azuredatabricks.net/api/2.0/accounts/${{ secrets.DATABRICKS_ACCOUNT_ID }}/metastores" \
            | jq -r --arg region "eastus2" \
              '.metastores[] | select(.region == $region) | .metastore_id' \
            | head -1)
          if [ -n "$METASTORE_ID" ]; then
            echo "Found existing metastore in eastus2: $METASTORE_ID"
            echo "TF_VAR_databricks_metastore_id=$METASTORE_ID" >> $GITHUB_ENV
          else
            echo "No existing metastore found in eastus2 — Terraform will create one"
          fi

      # The azurerm provider acquires its storage data-plane OAuth2 token once at
      # startup — granting this role inside Terraform is too late because the token
      # is issued before the role assignment is created.  Pre-grant here so every
      # token acquired during the apply already reflects the permission.
      - name: Pre-grant Storage Blob Data Contributor (ADLS Gen2 data-plane)
        run: |
          SP_OBJECT_ID=$(az ad sp show --id "${{ secrets.AZURE_CLIENT_ID }}" --query id -o tsv)
          echo "Ensuring Storage Blob Data Contributor on SP ${SP_OBJECT_ID}"
          az role assignment create \
            --assignee-object-id "$SP_OBJECT_ID" \
            --assignee-principal-type ServicePrincipal \
            --role "Storage Blob Data Contributor" \
            --scope "/subscriptions/${{ secrets.AZURE_SUBSCRIPTION_ID }}" \
            || echo "Role assignment already exists — continuing"
          echo "Waiting 30s for RBAC propagation before Terraform starts"
          sleep 30

      - name: Terraform Init
        working-directory: ${{ env.TF_DIR }}
        run: terraform init -backend-config=environments/dev/backend.tf
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Terraform Apply
        working-directory: ${{ env.TF_DIR }}
        run: |
          terraform apply \
            -var-file=environments/dev/terraform.tfvars \
            -auto-approve \
            -input=false
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          TF_VAR_databricks_account_id: ${{ secrets.DATABRICKS_ACCOUNT_ID }}

  # ── Deploy Prod (requires manual approval via GitHub Environment) ─────────
  deploy-prod:
    name: Deploy → prod
    runs-on: ubuntu-latest
    environment: prod  # GitHub environment with required reviewers configured
    needs: [deploy-dev]
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Azure Login (OIDC – prod)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID_PROD }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID_PROD }}

      - name: Discover existing Databricks metastore
        run: |
          DATABRICKS_TOKEN=$(az account get-access-token \
            --resource 2ff814a6-3304-4ab8-85cb-cd0e6f879c1d \
            --query accessToken -o tsv)
          METASTORE_ID=$(curl -sf \
            -H "Authorization: Bearer $DATABRICKS_TOKEN" \
            "https://accounts.azuredatabricks.net/api/2.0/accounts/${{ secrets.DATABRICKS_ACCOUNT_ID }}/metastores" \
            | jq -r --arg region "eastus2" \
              '.metastores[] | select(.region == $region) | .metastore_id' \
            | head -1)
          if [ -n "$METASTORE_ID" ]; then
            echo "Found existing metastore in eastus2: $METASTORE_ID"
            echo "TF_VAR_databricks_metastore_id=$METASTORE_ID" >> $GITHUB_ENV
          else
            echo "No existing metastore found in eastus2 — Terraform will create one"
          fi

      - name: Pre-grant Storage Blob Data Contributor (ADLS Gen2 data-plane)
        run: |
          SP_OBJECT_ID=$(az ad sp show --id "${{ secrets.AZURE_CLIENT_ID_PROD }}" --query id -o tsv)
          echo "Ensuring Storage Blob Data Contributor on SP ${SP_OBJECT_ID}"
          az role assignment create \
            --assignee-object-id "$SP_OBJECT_ID" \
            --assignee-principal-type ServicePrincipal \
            --role "Storage Blob Data Contributor" \
            --scope "/subscriptions/${{ secrets.AZURE_SUBSCRIPTION_ID_PROD }}" \
            || echo "Role assignment already exists — continuing"
          echo "Waiting 30s for RBAC propagation before Terraform starts"
          sleep 30

      - name: Terraform Init
        working-directory: ${{ env.TF_DIR }}
        run: terraform init -backend-config=environments/prod/backend.tf
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID_PROD }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID_PROD }}

      - name: Terraform Plan
        working-directory: ${{ env.TF_DIR }}
        run: |
          terraform plan \
            -var-file=environments/prod/terraform.tfvars \
            -out=tfplan-prod \
            -input=false
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID_PROD }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID_PROD }}
          TF_VAR_databricks_account_id: ${{ secrets.DATABRICKS_ACCOUNT_ID }}

      - name: Terraform Apply
        working-directory: ${{ env.TF_DIR }}
        run: terraform apply -auto-approve tfplan-prod
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID_PROD }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID_PROD }}
          TF_VAR_databricks_account_id: ${{ secrets.DATABRICKS_ACCOUNT_ID }}
